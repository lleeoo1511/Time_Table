<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
</head>
<body>
  <h1>Student Registration</h1>

  <form action="#" method="post">
    <p>
      <label for="full-name">Full Name:</label><br>
      <input id="full-name" name="full-name" type="text" required>
    </p>

    <p>
      <label for="student-id">Student ID:</label><br>
      <input id="student-id" name="student-id" type="text" required>
    </p>

    <p>
      <label for="email">University Email:</label><br>
      <input id="email" name="email" type="email" required>
    </p>

    <p>
      <label for="program">Program:</label><br>
      <select id="program" name="program" required>
        <option value="">Select one</option>
        <option>Computer Science</option>
        <option>Business Administration</option>
        <option>Engineering</option>
        <option>Psychology</option>
        <option>Design</option>
      </select>
    </p>

    <p>
      <label for="password">Password:</label><br>
      <input id="password" name="password" type="password" minlength="8" required>
    </p>

    <p>
      <label for="confirm-password">Confirm Password:</label><br>
      <input id="confirm-password" name="confirm-password" type="password" minlength="8" required>
    </p>

    <p><strong>Enrollment Options (choose any)</strong></p>
    <p><label><input type="checkbox" name="clubs" value="robotics"> Robotics & Innovation Club</label></p>
    <p><label><input type="checkbox" name="clubs" value="sports"> Sports Council</label></p>
    <p><label><input type="checkbox" name="clubs" value="arts"> Arts & Media Collective</label></p>
    <p><label><input type="checkbox" name="housing" value="hostel"> Apply for campus housing</label></p>
    <p><label><input type="checkbox" name="newsletter" value="yes"> Subscribe to student newsletter</label></p>

    <p>
      <label><input id="terms" name="terms" type="checkbox" required> I agree to the Student Honor Code and privacy policy.</label>
    </p>

    <p>
      <button type="submit">Create Account</button>
      <button type="reset">Clear</button>
    </p>
  </form>
</body>
</html>
